<style>
  .hero { padding:48px 40px 24px; text-align:center; }
  .hero-title { font-family:var(--font-display); font-size:72px; letter-spacing:4px; line-height:1; margin-bottom:4px; }
  .hero-subtitle { font-size:11px; letter-spacing:4px; text-transform:uppercase; color:var(--muted); }

  .action-bar { display:flex; justify-content:center; gap:12px; padding:0 40px 32px; }
  .action-btn {
    padding:10px 28px; font-family:var(--font-body); font-size:11px; letter-spacing:2px;
    text-transform:uppercase; cursor:pointer; border:1px solid var(--border);
    background:var(--surface); color:var(--text-dim); transition:all .2s;
  }
  .action-btn:hover { border-color:var(--accent); color:var(--text); }
  .action-btn.primary { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:500; }
  .action-btn.primary:hover { background:#d4c490; }
  .import-dropdown-menu.show { display:block !important; }
  .import-dropdown-item {
    display:block; width:100%; padding:10px 20px; font-family:var(--font-body); font-size:11px;
    letter-spacing:2px; text-transform:uppercase; cursor:pointer; border:none;
    background:transparent; color:var(--text-dim); text-align:left; transition:all .2s;
  }
  .import-dropdown-item:hover { background:var(--hover); color:var(--text); }

  .advance-grid {
    display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr));
    gap:16px; padding:0 40px 48px;
  }

  .advance-card {
    background:var(--surface); border:1px solid var(--border); padding:20px;
    cursor:pointer; transition:border-color .2s, transform .1s; position:relative; overflow:hidden;
  }
  .advance-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .advance-card::before {
    content:''; position:absolute; top:0; left:0; width:100%; height:3px; background:var(--muted);
  }
  .advance-card[data-status="not-started"]::before { background:var(--muted); }
  .advance-card[data-status="in-progress"]::before { background:var(--blue); }
  .advance-card[data-status="complete"]::before { background:var(--green); }

  .card-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:8px; }
  .card-venue { font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--accent); }
  .card-delete {
    background:none; border:none; color:var(--muted); cursor:pointer; font-size:16px;
    padding:0 4px; opacity:0; transition:opacity .15s, color .15s; line-height:1;
  }
  .advance-card:hover .card-delete { opacity:1; }
  .card-delete:hover { color:var(--red); }

  .card-title { font-family:var(--font-display); font-size:28px; letter-spacing:2px; line-height:1.1; margin-bottom:10px; }

  .card-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .card-meta span { font-size:10px; color:var(--text-dim); letter-spacing:1px; }

  .badge {
    font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:2px 8px;
    border:1px solid var(--border); color:var(--text-dim);
  }
  .badge-not-started { border-color:var(--muted); color:var(--muted); }
  .badge-in-progress { border-color:var(--blue); color:var(--blue); }
  .badge-complete { border-color:var(--green); color:var(--green); }

  .card-footer { display:flex; justify-content:space-between; align-items:baseline; border-top:1px solid var(--border); padding-top:10px; }
  .card-linked { font-size:9px; color:var(--orange); letter-spacing:1px; }
  .card-modified { font-size:9px; color:var(--muted); letter-spacing:1px; }

  .empty-state {
    grid-column:1/-1; text-align:center; padding:80px 20px;
    color:var(--muted); font-size:13px; letter-spacing:1px;
  }
  .empty-state-icon { font-size:48px; margin-bottom:16px; opacity:.4; }

  #importFile { display:none; }

  .mt-btn {
    padding:10px 28px; font-family:var(--font-body); font-size:11px; letter-spacing:2px;
    text-transform:uppercase; cursor:pointer; border:1px solid #6c5ce7;
    background:none; color:#6c5ce7; transition:all .2s;
  }
  .mt-btn:hover { background:#6c5ce7; color:var(--bg); }
  .mt-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,.8); z-index:1000;
    display:flex; align-items:center; justify-content:center;
  }
  .mt-modal {
    background:var(--surface); border:1px solid var(--border); padding:32px;
    max-width:640px; width:90%; max-height:80vh; overflow-y:auto; position:relative;
  }
  .mt-modal h3 { font-family:var(--font-display); font-size:24px; letter-spacing:2px; margin:0 0 16px; }
  .mt-close {
    position:absolute; top:12px; right:16px; background:none; border:none;
    color:var(--muted); font-size:20px; cursor:pointer;
  }
  .mt-list { list-style:none; padding:0; margin:12px 0; }
  .mt-list li {
    padding:10px 14px; border:1px solid var(--border); margin-bottom:6px;
    cursor:pointer; font-size:12px; letter-spacing:1px; transition:all .15s;
    display:flex; justify-content:space-between; align-items:center;
  }
  .mt-list li:hover { border-color:var(--accent); background:var(--surface-2); }
  .mt-list li.selected { border-color:#6c5ce7; background:rgba(108,92,231,.15); }
  .mt-status { font-size:11px; color:var(--muted); margin:8px 0; letter-spacing:1px; }
  .mt-match { font-size:9px; color:var(--green); letter-spacing:1px; }
  .mt-new { font-size:9px; color:var(--blue); letter-spacing:1px; }
  .mt-actions { margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; }

  .archive-section { padding:0 40px 48px; }
  .archive-header {
    display:flex; align-items:center; gap:10px; cursor:pointer; padding:12px 0;
    border-top:1px solid var(--border); user-select:none;
  }
  .archive-header:hover .archive-title { color:var(--text); }
  .archive-chevron { font-size:10px; color:var(--muted); transition:transform .2s; }
  .archive-chevron.open { transform:rotate(90deg); }
  .archive-title { font-size:11px; letter-spacing:3px; color:var(--muted); font-family:var(--font-body); }
  .archive-count {
    font-size:10px; letter-spacing:1px; color:var(--muted); background:var(--surface);
    border:1px solid var(--border); padding:2px 8px; border-radius:2px;
  }
  .archive-grid { padding:16px 0 0 !important; opacity:0.7; }

  @media (max-width:768px) {
    .hero-title { font-size:48px; }
    .advance-grid { grid-template-columns:1fr; padding:0 16px 32px; }
    .action-bar { padding:0 16px 24px; }
    .hero { padding:32px 16px 20px; }
    .archive-section { padding:0 16px 32px; }
  }
</style>

<div class="ticker">
  <div class="ticker-inner">
    NAPPY BOY LIVE &nbsp;&bull;&nbsp; PRODUCTION ADVANCES &nbsp;&bull;&nbsp; SHOW MANAGEMENT &nbsp;&bull;&nbsp; PRE-PRODUCTION &nbsp;&bull;&nbsp;

    <span class="archive-chevron" id="archiveChevron">&#9654;</span>
    <span class="archive-title">COMPLETED ADVANCES</span>
    <span class="archive-count" id="archiveCount">0</span>
  </div>
  <div class="advance-grid archive-grid" id="archiveGrid" style="display:none"></div>
</div>

<div class="footer">
  <span>NAPPY BOY LIVE &mdash; PRODUCTION ADVANCES</span>
  <span id="advanceCount"></span>
  <span id="footerDate"></span>

<script>
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Date.now() - new Date(iso).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  return Math.floor(days / 30) + 'mo ago';
}

function statusSlug(status) {
  return (status || 'not-started').toLowerCase().replace(/[^a-z0-9]/g, '-');
}

function fmtDate(d) {
  if (!d) return 'TBD';
  try {
    return new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' }).toUpperCase();
  } catch { return d; }
}

function renderAdvanceCard(a) {
  const slug = statusSlug(a.status);
  return `
    <div class="advance-card" data-status="${slug}" onclick="openAdvance('${escHtml(a.id)}')">
      <div class="card-header">
        <span class="card-venue">${escHtml(a.venue || 'NO VENUE')}</span>
        <button class="card-delete" onclick="event.stopPropagation(); deleteAdvance('${escHtml(a.id)}')" title="Delete advance">&times;</button>
      </div>
      <div class="card-title">${escHtml(a.showName || 'UNTITLED SHOW')}</div>
      <div class="card-meta">
        <span>${fmtDate(a.date)}</span>
        <span class="badge badge-${slug}">${escHtml(a.status || 'Not Started')}</span>
      </div>
      <div class="card-footer">
        <span class="card-linked">${a.linkedProjectId ? '🔗 LINKED' : ''}</span>
        <span class="card-modified">${timeAgo(a.lastModified)}</span>
      </div>
    </div>`;
}

function renderAdvances() {
  const advances = AdvanceStore.list();
  const grid = document.getElementById('advanceGrid');
  const archiveSection = document.getElementById('archiveSection');
  const archiveGrid = document.getElementById('archiveGrid');
  const archiveCount = document.getElementById('archiveCount');
  const counter = document.getElementById('advanceCount');
  counter.textContent = advances.length + ' ADVANCE' + (advances.length !== 1 ? 'S' : '');

  const active = advances.filter(a => statusSlug(a.status) !== 'complete');
  const completed = advances.filter(a => statusSlug(a.status) === 'complete');

  if (advances.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">📋</div>
        <div>No advances yet.<br>Click <strong>+ NEW ADVANCE</strong> or <strong>IMPORT XLSX</strong> to get started.</div>
      </div>`;
    archiveSection.style.display = 'none';
    return;
  }

  if (active.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-state-icon">✅</div>
        <div>All advances are complete!</div>
      </div>`;
  } else {
    grid.innerHTML = active.map(renderAdvanceCard).join('');
  }

  if (completed.length > 0) {
    archiveSection.style.display = 'block';
    archiveCount.textContent = completed.length;
    archiveGrid.innerHTML = completed.map(renderAdvanceCard).join('');
  } else {
    archiveSection.style.display = 'none';
  }
}

function toggleArchive() {
  const grid = document.getElementById('archiveGrid');
  const chevron = document.getElementById('archiveChevron');
  const isOpen = grid.style.display !== 'none';
  grid.style.display = isOpen ? 'none' : 'grid';
  chevron.classList.toggle('open', !isOpen);
}

function openAdvance(id) {
  window.location.href = 'advance.html?id=' + encodeURIComponent(id);
}

function newAdvance() {
  const id = AdvanceStore.create();
  window.location.href = 'advance.html?id=' + encodeURIComponent(id);
}

function deleteAdvance(id) {
  const adv = AdvanceStore.list().find(a => a.id === id);
  if (!confirm('Delete "' + (adv?.showName || 'this advance') + '"?\nThis cannot be undone.')) return;
  AdvanceStore.delete(id);
  renderAdvances();
}

// ── XLSX Import ──
function parseAdvanceSheet(ws) {
  const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
  const data = { meta:{}, contacts:[], schedule:[], crew:[], notes:'', links:[] };
  let section = 'general';

  for (let i = 0; i < rows.length; i++) {
    const r = rows[i];
    const c0 = String(r[0]||'').trim();
    const c1 = String(r[1]||'').trim();
    const c2 = String(r[2]||'').trim();
    const c3 = String(r[3]||'').trim();

    // Skip empty rows
    if (!c0 && !c1 && !c2 && !c3) continue;

    // Detect section headers
    if (/^GENERAL\s+INFO/i.test(c0)) { section = 'general'; continue; }
    if (/^SCHEDULE|^RUN\s+OF\s+SHOW|SCHEDULE\s*\/\s*ROS/i.test(c0)) { section = 'schedule'; continue; }
    if (/^PRODUCTION\s+NOTES/i.test(c0)) { section = 'notes'; continue; }
    if (/^CREW\s+FOR\s+SHOW/i.test(c0)) { section = 'crew'; continue; }
    if (/^ADVANCE\s+INFO\s+LINKS/i.test(c0)) { section = 'links'; continue; }
    if (/^PRODUCTION\s+ADVANCE$/i.test(c0)) {
      // Check for status in column D
      if (/STATUS/i.test(c3)) data.meta.status = c3.replace(/^ADVANCE\s+STATUS\?\s*/i, '').trim();
      continue;
    }

    // General Info
    if (section === 'general') {
      if (/^Show:/i.test(c0)) {
        data.meta.showName = c1 + (c2 ? ' — ' + c2 : '');
      } else if (/^Venue:/i.test(c0)) {
        data.meta.venue = c1;
        if (c2) data.meta.venueAddress = c2;
      } else if (/^Date:/i.test(c0)) {
        const rawD = r[1];
        if (rawD) {
          try {
            // Handle Excel serial date numbers (raw number from sheet)
            if (typeof rawD === 'number' && rawD > 1000 && rawD < 100000) {
              const dt = new Date(Date.UTC(1899, 11, 30) + rawD * 86400000);
              data.meta.date = dt.toISOString().slice(0,10);
            } else {
              const dt = new Date(String(rawD));
              if (!isNaN(dt)) data.meta.date = dt.toISOString().slice(0,10);
            }
          } catch {}
        }
      } else if (/PM\s*Contact/i.test(c0)) {
        section = 'contacts';
        if (c1) data.contacts.push({ role:'PM Contact', name:c1, email:c2||'', phone:c3||'' });
      } else if (/Other\s*Contact/i.test(c0)) {
        section = 'contacts';
      }
    }
    // Contacts
    else if (section === 'contacts') {
      if (c1 && (c2 || c3)) {
        // Detect if c2 is email or phone
        const isEmail = /@/.test(c2);
        const isPhone = /^\d[\d\s\-\(\)]+$/.test(c2);
        if (isEmail) {
          data.contacts.push({ role:c0||'', name:c1, email:c2, phone:c3||'' });
        } else if (isPhone) {
          data.contacts.push({ role:c0||'', name:c1, email:c3||'', phone:c2 });
        } else {
          data.contacts.push({ role:c0||'', name:c1, email:c2||'', phone:c3||'' });
        }
      }
    }
    // Schedule
    else if (section === 'schedule') {
      if (c0 && c1) {
        let timeStr = c1;
        // Convert Excel time serial or HH:MM:SS to HH:MM
        if (typeof r[1] === 'number' && r[1] < 1) {
          const totalMin = Math.round(r[1] * 24 * 60);
          const h = Math.floor(totalMin / 60);
          const m = totalMin % 60;
          timeStr = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
        } else if (/^\d{1,2}:\d{2}/.test(timeStr)) {
          timeStr = timeStr.slice(0, 5);
        }
        data.schedule.push({ label:c0, time:timeStr, day:c2||'', notes:c3||'' });
      }
    }
    // Crew
    else if (section === 'crew') {
      if (c0 && c1) {
        data.crew.push({ role:c0, name:c1 });
      }
    }
    // Notes
    else if (section === 'notes') {
      if (c0 || c1) {
        data.notes += (data.notes ? '\n' : '') + [c0,c1,c2,c3].filter(Boolean).join(' — ');
      }
    }
    // Links
    else if (section === 'links') {
      const url = [c0,c1,c2,c3].find(v => /^https?:\/\//i.test(v));
      if (url) {
        data.links.push({ label:'Advance Link', url: url });
      }
    }
  }

  // Auto-detect status from first row if not found
  if (!data.meta.status) data.meta.status = 'Not Started';
  else {
    // Normalize status
    const s = data.meta.status.toLowerCase();
    if (s.includes('progress')) data.meta.status = 'In Progress';
    else if (s.includes('complete') || s.includes('done')) data.meta.status = 'Complete';
    else data.meta.status = 'Not Started';
  }

  return data;
}

function importAdvanceXLSX(e) {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, { type:'array' });
      let imported = 0;

      wb.SheetNames.forEach(sheetName => {
        const ws = wb.Sheets[sheetName];
        const parsed = parseAdvanceSheet(ws);

        // Skip sheets that don't look like advances
        if (!parsed.meta.showName && !parsed.meta.venue && parsed.crew.length === 0) return;

        const id = AdvanceStore.create();
        const meta = {
          showName: parsed.meta.showName || sheetName,
          venue: parsed.meta.venue || '',
          date: parsed.meta.date || '',
          status: parsed.meta.status || 'Not Started',
          linkedProjectId: '',
        };
        AdvanceStore.save(id, parsed, meta);
        imported++;
      });

      if (imported > 0) {
        Toast.show(imported + ' advance' + (imported > 1 ? 's' : '') + ' imported', 'success');
        renderAdvances();
      } else {
        Toast.show('No valid advance sheets found in file', 'warning');
      }
    } catch (err) {
      alert('Error importing file: ' + err.message);
    }
  };
  reader.readAsArrayBuffer(file);
  e.target.value = '';
}

// ── MASTER TOUR IMPORT ──
function closeMT() { document.getElementById('mtOverlay').style.display = 'none'; }

async function mtApi(action, params = {}) {
  const qs = new URLSearchParams({ action, ...params }).toString();
  const res = await fetch('/api/mastertour?' + qs);
  if (!res.ok) {
    let detail = res.status;
    try {
      const body = await res.json();
      detail = body.detail || body.error || res.status;
    } catch {}
    throw new Error('MT API error: ' + detail);
  }
  return res.json();
}

async function openMTImport() {
  document.getElementById('mtOverlay').style.display = 'flex';
  document.getElementById('mtContent').innerHTML = '<p class="mt-status">Loading tours...</p>';

  try {
    const resp = await mtApi('tours');
    const tours = resp.tours || resp.data?.tours || resp.data || resp || [];
    if (!Array.isArray(tours) || !tours.length) {
      document.getElementById('mtContent').innerHTML = '<p class="mt-status">No tours found in Master Tour.</p>';
      return;
    }

    // Check each tour for upcoming show dates
    const today = new Date().toISOString().split('T')[0];
    const showTypes = ['show day', 'load-in day'];
    document.getElementById('mtContent').innerHTML = '<p class="mt-status">Checking tours for upcoming shows...</p>';

    const tourChecks = await Promise.all(tours.map(async t => {
      const id = t.tourId || t.id;
      try {
        const r = await mtApi('tour', { tourId: id });
        const tour = r.tour || r.data?.tour || r.data || r;
        const days = tour.days || tour.tourDates || tour.dates || [];
        const upcoming = Array.isArray(days) && days.some(d => {
          const type = (d.dayType || '').toLowerCase();
          if (!showTypes.includes(type)) return false;
          const raw = d.dayDate || d.date || '';
          try { return new Date(raw).toISOString().split('T')[0] >= today; } catch { return false; }
        });
        return upcoming ? t : null;
      } catch { return null; }
    }));

    const activeTours = tourChecks.filter(Boolean);
    if (!activeTours.length) {
      document.getElementById('mtContent').innerHTML = '<p class="mt-status">No tours with upcoming show dates found.</p>';
      return;
    }

    let html = '<p class="mt-status">Select a tour to import from:</p><ul class="mt-list">';
    activeTours.forEach(t => {
      const name = t.legName || t.organizationName || t.tourName || t.name || t.artistName || 'Untitled Tour';
      const id = t.tourId || t.id;
      html += `<li onclick="selectMTTour('${id}', this)"><span>${escHtml(name)}</span></li>`;
    });
    html += '</ul>';
    document.getElementById('mtContent').innerHTML = html;
  } catch (err) {
    document.getElementById('mtContent').innerHTML = `<p class="mt-status" style="color:var(--red)">Error: ${err.message}</p>`;
  }
}

let _mtSelectedDates = [];
let _mtTourId = null;

async function selectMTTour(tourId, el) {
  document.querySelectorAll('#mtContent > .mt-list li').forEach(li => li.classList.remove('selected'));
  el.classList.add('selected');
  _mtTourId = tourId;
  _mtSelectedDates = [];

  let dateDiv = document.getElementById('mtDates');
  if (!dateDiv) {
    dateDiv = document.createElement('div');
    dateDiv.id = 'mtDates';
    document.getElementById('mtContent').appendChild(dateDiv);
  }
  dateDiv.innerHTML = '<p class="mt-status">Loading tour dates...</p>';

  try {
    const resp = await mtApi('tour', { tourId });
    const tour = resp.tour || resp.data?.tour || resp.data || resp;
    const dates = tour.days || tour.tourDates || tour.dates || [];

    if (!Array.isArray(dates) || !dates.length) {
      dateDiv.innerHTML = '<p class="mt-status">No dates found for this tour.</p>';
      return;
    }

    // Sort by date (soonest first)
    dates.sort((a, b) => new Date(a.dayDate || a.date || 0) - new Date(b.dayDate || b.date || 0));

    // Filter: only show days with actual show data (Show Day / Load-In Day) and today or future
    const today = new Date().toISOString().split('T')[0];
    const showTypes = ['show day', 'load-in day'];
    const filtered = dates.filter(d => {
      const type = (d.dayType || '').toLowerCase();
      if (!showTypes.includes(type)) return false;
      const raw = d.dayDate || d.date || '';
      try {
        const dt = new Date(raw);
        if (!isNaN(dt)) return dt.toISOString().split('T')[0] >= today;
      } catch {}
      return false;
    });

    if (!filtered.length) {
      dateDiv.innerHTML = '<p class="mt-status">No upcoming show dates found for this tour.</p>';
      return;
    }

    // Get existing advances to check for date matches
    const existingAdvances = AdvanceStore.list();

    let html = '<p class="mt-status" style="margin-top:16px">Select show dates to import (click to toggle):</p>';
    html += '<ul class="mt-list" id="mtDateList">';

    filtered.forEach((d, i) => {
      const rawDate = d.dayDate || d.date || d.startDate || '';
      let dateStr = rawDate;
      try {
        const dt = new Date(rawDate);
        if (!isNaN(dt)) dateStr = dt.toISOString().split('T')[0];
      } catch {}

      const venue = d.name || d.venue?.name || d.venueName || '';
      const city = d.venue?.city || d.city || '';
      const dayId = d.id || d.dayId;
      const label = `${dateStr}${venue ? ' — ' + venue : ''}${city ? ' (' + city + ')' : ''}`;

      // Check if an advance already exists for this date
      const match = existingAdvances.find(a => a.date === dateStr);
      const matchTag = match
        ? `<span class="mt-match">EXISTING: ${escHtml(match.showName || 'Untitled')}</span>`
        : '<span class="mt-new">NEW ADVANCE</span>';

      html += `<li data-idx="${i}" data-dayid="${dayId}" data-date="${dateStr}" data-venue="${escHtml(venue)}" data-city="${escHtml(city)}" onclick="toggleMTDate(this)">
        <span>${escHtml(label)}</span>${matchTag}
      </li>`;
    });

    html += '</ul>';
    html += `<div class="mt-actions">
      <button class="mt-btn" onclick="selectAllMTDates()">SELECT ALL</button>
      <button class="mt-btn" onclick="importSelectedMTDates()" id="mtImportBtn" style="border-color:var(--accent); color:var(--accent);">IMPORT SELECTED (0)</button>
    </div>`;
    html += '<div id="mtImportStatus"></div>';

    dateDiv.innerHTML = html;
  } catch (err) {
    dateDiv.innerHTML = `<p class="mt-status" style="color:var(--red)">Error: ${err.message}</p>`;
  }
}

function toggleMTDate(li) {
  li.classList.toggle('selected');
  updateMTImportCount();
}

function selectAllMTDates() {
  const all = document.querySelectorAll('#mtDateList li');
  const allSelected = Array.from(all).every(li => li.classList.contains('selected'));
  all.forEach(li => {
    if (allSelected) li.classList.remove('selected');
    else li.classList.add('selected');
  });
  updateMTImportCount();
}

function updateMTImportCount() {
  const count = document.querySelectorAll('#mtDateList li.selected').length;
  const btn = document.getElementById('mtImportBtn');
  if (btn) btn.textContent = `IMPORT SELECTED (${count})`;
}

async function importSelectedMTDates() {
  const selected = document.querySelectorAll('#mtDateList li.selected');
  if (!selected.length) { Toast.show('No dates selected', 'warning'); return; }

  const statusDiv = document.getElementById('mtImportStatus');
  statusDiv.innerHTML = `<p class="mt-status">Importing ${selected.length} show(s)...</p>`;

  const existingAdvances = AdvanceStore.list();
  let created = 0, updated = 0;

  for (const li of selected) {
    const dayId = li.dataset.dayid;
    const dateStr = li.dataset.date;

    try {
      // Fetch all data for this day in parallel
      const [dayResp, crewResp, hotelResp, schedResp] = await Promise.all([
        mtApi('day', { dayId }),
        mtApi('crew', { tourId: _mtTourId }),
        mtApi('hotels', { dayId }),
        mtApi('schedule', { dayId }),
      ]);

      const day = dayResp.data || dayResp;
      const crew = (crewResp.data || crewResp || []);
      const hotels = (hotelResp.data || hotelResp || []);
      const schedule = (schedResp.data || schedResp || []);

      // Build advance data from MT response
      const showName = day.tourName || day.name || '';
      const venueName = day.venue?.name || day.venueName || '';
      const venueAddr = day.venue?.address || '';
      const venueCity = day.venue?.city || day.city || '';
      const showDate = dateStr;

      // Check if advance exists for this date
      const existing = existingAdvances.find(a => a.date === dateStr);

      let advId, advData;

      if (existing) {
        // Load existing advance data and merge
        advId = existing.id;
        advData = AdvanceStore.load(advId) || {};
        if (!advData.meta) advData.meta = {};
        if (!advData.contacts) advData.contacts = [];
        if (!advData.schedule) advData.schedule = [];
        if (!advData.crew) advData.crew = [];
        if (!advData.hotel) advData.hotel = [];
        if (!advData.links) advData.links = [];
        updated++;
      } else {
        // Create new advance
        advId = AdvanceStore.create();
        advData = { meta:{}, contacts:[], schedule:[], crew:[], hotel:[], notes:'', links:[] };
        created++;
      }

      // Fill meta (only if blank on existing)
      if (!advData.meta.showName) advData.meta.showName = showName;
      if (!advData.meta.venue) advData.meta.venue = venueName;
      if (!advData.meta.venueAddress) advData.meta.venueAddress = (venueAddr ? venueAddr + (venueCity ? ', ' + venueCity : '') : venueCity);
      if (!advData.meta.date) advData.meta.date = showDate;
      if (!advData.meta.status) advData.meta.status = 'Not Started';

      // Store MT link for auto-sync
      advData.meta.masterTourDayId = dayId;
      advData.meta.masterTourTourId = _mtTourId;

      // Merge crew (by name)
      const crewArr = Array.isArray(crew) ? crew : [];
      crewArr.forEach(c => {
        const name = c.name || ((c.firstName || '') + ' ' + (c.lastName || '')).trim();
        const role = c.role || c.position || c.department || '';
        if (!name) return;
        const exists = advData.crew.some(ec => ec.name && ec.name.toLowerCase() === name.toLowerCase());
        if (!exists) advData.crew.push({ role, name });
      });

      // Enrich crew from shared roster (auto-fill phone, email, etc.)
      const roster = getSavedRoster();
      if (roster.length) {
        advData.crew = DataEnrichment.enrichFromRoster(advData.crew, roster);
      }

      // Merge schedule (by label)
      const schedArr = Array.isArray(schedule) ? schedule : [];
      schedArr.forEach(s => {
        const label = s.name || s.title || s.description || '';
        const time = s.startTime || s.time || '';
        if (!label) return;
        const exists = advData.schedule.some(es => es.label && es.label.toLowerCase() === label.toLowerCase());
        if (!exists) advData.schedule.push({ label, time, day:'', notes: s.notes || '' });
      });

      // Merge hotels (by name + date)
      const hotelArr = Array.isArray(hotels) ? hotels : [];
      hotelArr.forEach(h => {
        const hotelName = h.name || h.hotelName || '';
        if (!hotelName) return;
        let ci = h.checkIn || h.checkinDate || '';
        let co = h.checkOut || h.checkoutDate || '';
        try { if (ci) ci = new Date(ci).toISOString().split('T')[0]; } catch {}
        try { if (co) co = new Date(co).toISOString().split('T')[0]; } catch {}
        const exists = advData.hotel.some(eh => eh.hotel && eh.hotel.toLowerCase() === hotelName.toLowerCase() && eh.checkin === ci);
        if (!exists) advData.hotel.push({
          guest: '', hotel: hotelName, checkin: ci, checkout: co,
          confirmation: h.confirmationNumber || h.confirmation || '',
          notes: h.notes || '',
        });
      });

      // Merge venue contacts
      if (day.venue?.id || day.venueId) {
        try {
          const contactResp = await mtApi('contacts', { companyId: day.venue?.id || day.venueId });
          const contacts = (contactResp.data || contactResp || []);
          const contactArr = Array.isArray(contacts) ? contacts : [];
          contactArr.forEach(c => {
            const name = c.name || ((c.firstName || '') + ' ' + (c.lastName || '')).trim();
            if (!name) return;
            const exists = advData.contacts.some(ec => ec.name && ec.name.toLowerCase() === name.toLowerCase());
            if (!exists) advData.contacts.push({
              role: c.title || c.role || 'Venue Contact',
              name, email: c.email || '', phone: c.phone || c.mobilePhone || '',
            });
          });
        } catch {}
      }

      // Append notes
      const dayNotes = [day.generalNotes, day.travelNotes, day.hotelNotes].filter(Boolean).join('\n\n');
      if (dayNotes) {
        const marker = '--- MASTER TOUR ---';
        if (!advData.notes) advData.notes = '';
        if (!advData.notes.includes(marker)) {
          advData.notes += (advData.notes ? '\n\n' : '') + marker + '\n' + dayNotes;
        }
      }

      // Save
      AdvanceStore.save(advId, advData, {
        showName: advData.meta.showName || 'UNTITLED SHOW',
        venue: advData.meta.venue || '',
        date: advData.meta.date || '',
        status: advData.meta.status || 'Not Started',
        linkedProjectId: advData.meta.linkedProjectId || '',
      });

    } catch (err) {
      console.warn('MT import error for day ' + dayId, err);
    }
  }

  statusDiv.innerHTML = `<p class="mt-status" style="color:var(--accent)">Done! ${created} new advance(s) created, ${updated} existing advance(s) updated.</p>
    <button class="mt-btn" style="margin-top:12px; border-color:var(--accent); color:var(--accent);" onclick="closeMT()">DONE</button>`;

  renderAdvances();
}

// Auth callback
function onAuthChanged(user) {
  AdvanceStore.listCloud().then(() => renderAdvances());
  AdvanceStore.syncAllToCloud();
}

function getSavedRoster() {
  try { return JSON.parse(localStorage.getItem('nbl_saved_roster') || '[]'); } catch { return []; }
}

// Close import dropdown when clicking outside
document.addEventListener('click', e => {
  if (!e.target.closest('.import-dropdown')) {
    document.querySelectorAll('.import-dropdown-menu').forEach(m => m.classList.remove('show'));
  }
});

// Init
document.getElementById('footerDate').textContent =
  new Date().toLocaleDateString('en-US', { month:'short', year:'numeric' }).toUpperCase();
initAuth().then(user => {
  AdvanceStore.listCloud().then(() => renderAdvances());
  AdvanceStore.syncAllToCloud();
});
</script>
